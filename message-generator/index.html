<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Generator</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <main class="tool-workspace">
        <div class="fluid-grid">
            
            <!-- Left Side: Controls & Dynamic Inputs -->
            <div class="panel">
                <h2>Variables</h2>
                
                <!-- Category Selector -->
                <div class="form-group" style="margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border-color);">
                    <label for="template-selector">Select Category</label>
                    <select id="template-selector">
                        <option value="general.csv">General Inquiries</option>
                        <option value="sales.csv">Sales & Outreach</option>
                        <option value="support.csv">Tech Support</option>
                    </select>
                </div>

                <!-- Dynamic Variables Form -->
                <form id="variables-form">
                    <p style="color: var(--text-secondary); font-size: 0.9rem;">Loading variables...</p>
                </form>
            </div>

            <!-- Right Side: Generated Messages -->
            <div class="panel">
                <h2>Boilerplate Messages</h2>
                <div id="messages-container" style="display: flex; flex-direction: column; gap: 1rem;">
                    <!-- Messages will render here -->
                </div>
            </div>

        </div>
    </main>

    <script src="../app.js"></script>
    <script src="script.js"></script>
</body>
</html>
